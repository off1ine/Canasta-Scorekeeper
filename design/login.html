<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SCOREKEEPER - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#e2dfff",
                        "on-secondary-fixed-variant": "#413f82",
                        "on-surface": "#191c1e",
                        "on-primary-container": "#dad7ff",
                        "secondary-fixed": "#e2dfff",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#c3c0ff",
                        "surface-container-high": "#e6e8ea",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f2f4f6",
                        "on-surface-variant": "#464555",
                        "secondary": "#58579b",
                        "on-tertiary": "#ffffff",
                        "surface": "#f7f9fb",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#140f54",
                        "inverse-surface": "#2d3133",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "on-primary-fixed": "#0f0069",
                        "surface-variant": "#e0e3e5",
                        "surface-tint": "#4d44e3",
                        "outline-variant": "#c7c4d8",
                        "surface-container-highest": "#e0e3e5",
                        "surface-container": "#eceef0",
                        "secondary-container": "#b6b4ff",
                        "error": "#ba1a1a",
                        "tertiary-container": "#a44100",
                        "surface-dim": "#d8dadc",
                        "tertiary-fixed": "#ffdbcc",
                        "primary-container": "#4f46e5",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#3525cd",
                        "inverse-on-surface": "#eff1f3",
                        "on-primary-fixed-variant": "#3323cc",
                        "surface-bright": "#f7f9fb",
                        "on-secondary-container": "#454386",
                        "tertiary": "#7e3000",
                        "on-tertiary-fixed": "#351000",
                        "outline": "#777587",
                        "tertiary-fixed-dim": "#ffb695",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "background": "#f7f9fb",
                        "on-background": "#191c1e",
                        "on-tertiary-container": "#ffd2be",
                        "secondary-fixed-dim": "#c3c0ff",
                        "primary-fixed-dim": "#c3c0ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input::placeholder {
            color: #777587;
            opacity: 0.5;
        }
        .pin-mask {
            font-family: 'Inter';
            letter-spacing: 1.25rem;
            font-size: 1.5rem;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body flex flex-col min-h-screen">
<!-- Top Navigation Anchor (Manual mapping of SCOREKEEPER Brand Identity) -->
<header class="flex items-center justify-center px-6 py-12 w-full sticky top-0 bg-surface">
<div class="text-center">
<h1 class="font-headline font-bold tracking-[0.2em] text-on-surface text-2xl uppercase">SCOREKEEPER</h1>
<p class="text-outline text-xs mt-1 font-medium tracking-wide">Canasta made simple.</p>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 -mt-16">
<!-- Main Login Card (Architectural Ledger Style) -->
<div class="w-full max-w-sm bg-surface-container-lowest rounded-lg border border-outline-variant/20 shadow-[0_12px_40px_rgba(25,28,30,0.04)] p-8">
<div class="mb-8">
<h2 class="text-[22px] font-semibold text-on-surface tracking-tight">Welcome back</h2>
<p class="text-on-surface-variant text-sm mt-1">Sign in to continue scoring.</p>
</div>
<form class="space-y-6">
<!-- Username Field -->
<div>
<label class="block text-[0.75rem] font-medium text-outline mb-2 uppercase tracking-wider" for="username">Username</label>
<input class="w-full bg-transparent border-b border-outline-variant/20 focus:border-primary-container focus:ring-0 transition-colors duration-200 py-2 tabular-nums text-on-surface outline-none" id="username" name="username" placeholder="e.g. CardMaster99" type="text"/>
</div>
<!-- 4-Digit PIN Field -->
<div>
<label class="block text-[0.75rem] font-medium text-outline mb-2 uppercase tracking-wider" for="pin">4-Digit PIN</label>
<div class="relative">
<input class="w-full bg-transparent border-b border-outline-variant/20 focus:border-primary-container focus:ring-0 transition-colors duration-200 py-2 pin-mask text-on-surface outline-none" id="pin" inputmode="numeric" maxlength="4" name="pin" pattern="[0-9]*" placeholder="••••" type="password"/>
</div>
<p class="mt-3 text-[10px] text-outline/70 leading-relaxed">
                        PINs are stored hashed. Use HTTPS so logins are protected.
                    </p>
</div>
<!-- Sign In Action -->
<button class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-semibold text-sm shadow-lg shadow-primary-container/20 active:scale-[0.98] transition-transform duration-200 mt-4" type="submit">
                    Sign in
                </button>
</form>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<button class="text-primary text-sm font-medium hover:underline underline-offset-4 transition-all">
                First time here? Create admin account
            </button>
</div>
</main>
<!-- Empty Spacer for Mobile Layout Balance -->
<footer class="py-10"></footer>
</body></html>
