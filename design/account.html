<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scorekeeper - Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary": "#ffffff",
                    "background": "#f7f9fb",
                    "tertiary-fixed-dim": "#ffb695",
                    "on-error-container": "#93000a",
                    "outline": "#777587",
                    "primary-fixed-dim": "#c3c0ff",
                    "secondary-fixed-dim": "#c3c0ff",
                    "on-tertiary-container": "#ffd2be",
                    "on-background": "#191c1e",
                    "inverse-on-surface": "#eff1f3",
                    "surface-container-lowest": "#ffffff",
                    "primary": "#3525cd",
                    "tertiary-fixed": "#ffdbcc",
                    "primary-container": "#4f46e5",
                    "tertiary-container": "#a44100",
                    "surface-dim": "#d8dadc",
                    "error": "#ba1a1a",
                    "tertiary": "#7e3000",
                    "on-tertiary-fixed": "#351000",
                    "surface-bright": "#f7f9fb",
                    "on-secondary-container": "#454386",
                    "on-primary-fixed-variant": "#3323cc",
                    "inverse-surface": "#2d3133",
                    "on-secondary-fixed": "#140f54",
                    "on-error": "#ffffff",
                    "surface-container": "#eceef0",
                    "secondary-container": "#b6b4ff",
                    "surface-container-highest": "#e0e3e5",
                    "surface-variant": "#e0e3e5",
                    "surface-tint": "#4d44e3",
                    "outline-variant": "#c7c4d8",
                    "on-primary-fixed": "#0f0069",
                    "on-tertiary-fixed-variant": "#7b2f00",
                    "on-primary-container": "#dad7ff",
                    "on-surface": "#191c1e",
                    "primary-fixed": "#e2dfff",
                    "on-secondary-fixed-variant": "#413f82",
                    "surface": "#f7f9fb",
                    "secondary": "#58579b",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#f2f4f6",
                    "on-surface-variant": "#464555",
                    "surface-container-high": "#e6e8ea",
                    "error-container": "#ffdad6",
                    "secondary-fixed": "#e2dfff",
                    "on-primary": "#ffffff",
                    "inverse-primary": "#c3c0ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col pb-24">
<!-- TopAppBar -->
<header class="bg-[#f7f9fb] dark:bg-slate-950 flex justify-between items-center w-full px-6 h-16 docked full-width top-0 sticky z-50">
<div class="flex items-center gap-4">
<span class="text-lg font-bold tracking-[0.1em] text-slate-900 dark:text-slate-100 font-['Inter'] tabular-nums tracking-tight font-semibold">SCOREKEEPER</span>
</div>
<div class="flex items-center gap-3">
<!-- Space for top-right actions if needed, left empty as per prompt -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow container mx-auto px-4 pt-6 max-w-md flex flex-col gap-6">
<!-- Identity & Profile Block -->
<section class="bg-surface-container-lowest border border-outline-variant/20 rounded-lg p-6 flex flex-col items-center">
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center mb-4">
<span class="text-on-primary-container text-2xl font-bold">JT</span>
</div>
<h1 class="text-[18px] font-bold text-on-surface mb-1">julian</h1>
<p class="text-sm text-outline font-medium">Admin · Member since 3 Feb 2026</p>
<!-- Security / PIN Change Section -->
<div class="w-full mt-10 space-y-6">
<div class="flex flex-col gap-1">
<span class="text-[12px] font-bold tracking-wider text-outline uppercase">CHANGE PIN</span>
</div>
<form class="space-y-6">
<div class="space-y-1">
<label class="text-[11px] font-semibold text-outline-variant uppercase tracking-tighter" for="current-pin">Current PIN</label>
<input class="w-full h-12 bg-surface border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 outline-none tabular-nums text-2xl px-1 transition-all duration-200" id="current-pin" placeholder="••••" type="password"/>
</div>
<div class="space-y-1">
<label class="text-[11px] font-semibold text-outline-variant uppercase tracking-tighter" for="new-pin">New PIN (4 digits)</label>
<input class="w-full h-12 bg-surface border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 outline-none tabular-nums text-2xl px-1 transition-all duration-200" id="new-pin" maxlength="4" placeholder="••••" type="password"/>
</div>
<div class="space-y-1">
<label class="text-[11px] font-semibold text-outline-variant uppercase tracking-tighter" for="repeat-pin">Repeat new PIN</label>
<input class="w-full h-12 bg-surface border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 outline-none tabular-nums text-2xl px-1 transition-all duration-200" id="repeat-pin" maxlength="4" placeholder="••••" type="password"/>
</div>
<div class="pt-2">
<p class="text-[11px] text-outline leading-relaxed mb-4">
                            PINs are stored hashed. Use HTTPS so logins are protected.
                        </p>
<button class="w-full h-12 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-lg transition-transform active:scale-[0.98]" type="submit">
                            Update PIN
                        </button>
</div>
</form>
</div>
</section>
<!-- Logout Action -->
<section class="mb-8">
<button class="w-full h-14 flex items-center justify-center gap-3 border border-error/30 rounded-lg text-error font-semibold hover:bg-error-container/10 transition-colors">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
                Log out
            </button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center py-3 px-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl z-50 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_20px_rgba(0,0,0,0.03)]">
<!-- Overview -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 opacity-70 hover:text-indigo-500 dark:hover:text-indigo-300" href="#">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">Overview</span>
</a>
<!-- Stats -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 opacity-70 hover:text-indigo-500 dark:hover:text-indigo-300" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">Stats</span>
</a>
<!-- Setup -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 opacity-70 hover:text-indigo-500 dark:hover:text-indigo-300" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">Setup</span>
</a>
<!-- Account (ACTIVE) -->
<a class="flex flex-col items-center justify-center text-indigo-600 dark:text-indigo-400 scale-105 transition-transform transition-colors duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Inter'] text-[11px] font-bold tracking-wide">Account</span>
</a>
</nav>
</body></html>
